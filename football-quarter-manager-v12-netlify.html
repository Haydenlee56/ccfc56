<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Football Quarter Manager</title>
<style>
@import url("https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css");

:root{
  --bg:#060b14;
  --shell:#0b1220;
  --panel:#222426;
  --panel2:#1b1d1f;
  --line:#3a3f45;
  --text:#f5f7fa;
  --muted:#a9b1bb;
  --chip:#eceff1;
  --chiptext:#10161f;
  --chipsel:#1f8f45;
  --chipseltext:#ffffff;
  --field:#0d5b19;
  --field2:#0a4b15;
  --fieldline:rgba(255,255,255,.22);
  --slotline:rgba(255,255,255,.24);
  --gold:#b88912;
  --danger:#c62828;
  --dangerbg:#8f1f1f;
  --shadow:0 12px 28px rgba(0,0,0,.26);
  --w:min(100vw,430px);
}

*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{
  margin:0;
  background:
    radial-gradient(circle at top, rgba(255,255,255,.03), transparent 28%),
    linear-gradient(180deg,#03060c 0%, #07111a 100%);
  font-family:"Pretendard",system-ui,sans-serif;
  color:var(--text);
  display:flex;
  justify-content:center;
  align-items:flex-start;
}
.app{width:var(--w); min-height:100dvh; padding:8px}
.frame{
  min-height:calc(100dvh - 16px);
  display:flex;
  flex-direction:column;
  gap:8px;
}
.panel{
  background:
    linear-gradient(180deg, rgba(255,255,255,.03), rgba(255,255,255,0)),
    linear-gradient(180deg,var(--panel),var(--panel2));
  border:1px solid var(--line);
  border-radius:0;
  padding:10px;
  box-shadow:var(--shadow);
}
.brand{
  text-align:center;
  margin-bottom:8px;
  font-size:14px;
  font-weight:800;
  letter-spacing:.2px;
}
.brand-badge{
  display:inline-block;
  padding:4px 10px 5px;
  background:linear-gradient(90deg, transparent, rgba(255,255,255,.05), transparent);
}
.input-row{
  display:grid;
  grid-template-columns:52px 38px 1fr 42px 42px;
  gap:6px;
  margin-bottom:8px;
}
.label-box,.add-btn,.count-box,.quarter-tab,.mini-title,.tool-btn{
  display:flex;align-items:center;justify-content:center;
  border-radius:0;
  font-weight:700;height:34px;font-size:12px;line-height:1;
  background:linear-gradient(180deg, rgba(255,255,255,.03), rgba(255,255,255,.02));
  color:#f3f4f6;border:1px solid var(--line);
}
.name-input{
  width:100%;height:34px;border-radius:0;border:1px solid #cfd5da;background:#eef1f3;color:#10151d;
  font-size:13px;font-weight:600;padding:0 8px;outline:none;text-align:center;
}
.name-input::placeholder{color:#6b7280;font-weight:600}
.add-btn,.tool-btn,.quarter-tab{cursor:pointer}
.delete-mode{transition:.15s}
.delete-mode.active{
  background:linear-gradient(180deg,#b71c1c,#851212);
  border-color:#ef5350;
  color:#fff;
}
.attendees-grid{
  display:grid;
  grid-template-columns:repeat(5,1fr);
  gap:6px;
}
.attendee{
  height:36px;border:none;border-radius:0;background:linear-gradient(180deg,#f3f5f6,#e5e8ea);color:var(--chiptext);font-size:12px;font-weight:700;
  cursor:pointer;display:flex;align-items:center;justify-content:center;padding:0 4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;gap:0;
}
.attendee.selected{
  background:linear-gradient(180deg,#22a54e,#1a7f3d);
  color:var(--chipseltext);
}
.attendee.delete-target{
  background:linear-gradient(180deg,#ffd7d7,#ffc7c7);
  color:#7f1d1d;
}
.attendee .main-num{color:#111827}
.attendee.selected .main-num{color:#fff}
.attendee .slash{color:#111827}
.attendee.selected .slash{color:#fff}
.attendee .gk-num{color:var(--gold)}
.attendee.empty{visibility:hidden;pointer-events:none}

.field-header{
  display:grid;
  grid-template-columns:70px 44px 44px 1fr;
  align-items:center;
  margin-bottom:8px;
  gap:6px;
}
.tabs{display:grid;grid-template-columns:repeat(4,1fr);gap:4px}
.quarter-tab{font-size:11px}
.quarter-tab.active{
  background:linear-gradient(180deg,#0e1218,#171c24);
  border-color:#535a63;
  color:#fff;
}
.tool-btn{
  height:30px;
  font-size:11px;
  padding:0;
}
.field{
  position:relative;
  border-radius:0;
  background:
    linear-gradient(90deg, rgba(255,255,255,.03) 0%, rgba(255,255,255,0) 9%, rgba(255,255,255,.03) 18%, rgba(255,255,255,0) 27%, rgba(255,255,255,.03) 36%, rgba(255,255,255,0) 45%, rgba(255,255,255,.03) 54%, rgba(255,255,255,0) 63%, rgba(255,255,255,.03) 72%, rgba(255,255,255,0) 81%, rgba(255,255,255,.03) 90%),
    linear-gradient(180deg,var(--field),var(--field2));
  padding:10px;
  overflow:hidden;
  border:1px solid rgba(255,255,255,.06);
}
.field:before{
  content:"";
  position:absolute;
  left:0;top:50%;transform:translateY(-50%);
  width:100%;height:1px;
  background:var(--fieldline);opacity:.65;
}
.center-circle{
  position:absolute;width:86px;height:86px;border-radius:50%;
  border:1px solid var(--fieldline);left:50%;top:50%;
  transform:translate(-50%,-50%);opacity:.6;
}
.penalty-top,.penalty-bottom{
  position:absolute;left:50%;transform:translateX(-50%);
  width:132px;height:56px;border:1px solid var(--fieldline);opacity:.52;
}
.penalty-top{top:0;border-top:none}
.penalty-bottom{bottom:0;border-bottom:none}

.field-grid{
  position:relative;z-index:1;
  display:grid;
  grid-template-columns:repeat(5,1fr);
  grid-template-rows:repeat(5,1fr);
  gap:5px;
  height:48svh;
  max-height:390px;
  min-height:250px;
}
.slot{
  border:1px dashed var(--slotline);
  border-radius:0;
  background:rgba(255,255,255,.02);
  color:#f8fafc;
  font-size:15px;
  font-weight:700;
  display:flex;align-items:center;justify-content:center;text-align:center;
  padding:2px;cursor:pointer;user-select:none;overflow:hidden;word-break:keep-all;line-height:1.05;flex-direction:column;
}
.slot.filled{background:rgba(255,255,255,.045)}
.slot.dup{background:#fee2e2;border-color:#fca5a5;color:#7f1d1d}
.gk-label{font-size:9px;color:var(--gold);font-weight:700;line-height:1;margin-top:2px}

.rest-grid{display:flex;flex-wrap:wrap;gap:6px}
.rest-cell{
  min-width:74px;height:34px;border-radius:0;background:linear-gradient(180deg,#f1f3f4,#dfe3e6);color:#0f172a;font-size:12px;font-weight:700;
  display:flex;align-items:center;justify-content:center;padding:0 8px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.rest-label{
  background:linear-gradient(180deg, rgba(255,255,255,.03), rgba(255,255,255,.02));
  color:#f9fafb;border:1px solid var(--line);min-width:58px
}
.credit{text-align:center;color:var(--muted);font-size:10px;margin-top:auto;padding-top:2px;letter-spacing:.15px}

@media (max-width:380px){
  .brand{font-size:13px}
  .attendee{font-size:11px}
  .rest-cell{font-size:11px;min-width:66px}
  .slot{font-size:14px}
  .field-grid{height:44svh}
  .field-header{grid-template-columns:64px 40px 40px 1fr}
  .tool-btn{font-size:10px}
}
</style>
</head>
<body>
<div class="app">
  <div class="frame">
    <div class="panel">
      <div class="brand"><span class="brand-badge">Football Quarter Manager</span></div>
      <div class="input-row">
        <div class="label-box">참석자</div>
        <div id="countBox" class="count-box">0</div>
        <input id="nameInput" class="name-input" placeholder="이름 입력" maxlength="12" />
        <button id="addBtn" class="add-btn">추가</button>
        <button id="deleteModeBtn" class="tool-btn delete-mode">삭제</button>
      </div>
      <div id="attendeeGrid" class="attendees-grid"></div>
    </div>

    <div class="panel">
      <div class="field-header">
        <div class="mini-title">포메이션</div>
        <button id="clearQuarterBtn" class="tool-btn">리셋</button>
        <button id="copyNextBtn" class="tool-btn">복사</button>
        <div id="quarterTabs" class="tabs"></div>
      </div>
      <div class="field">
        <div class="penalty-top"></div>
        <div class="penalty-bottom"></div>
        <div class="center-circle"></div>
        <div id="fieldGrid" class="field-grid"></div>
      </div>
    </div>

    <div class="panel">
      <div id="restGrid" class="rest-grid"></div>
    </div>

    <div class="credit">Hayden Lee</div>
  </div>
</div>

<script>
(() => {
const STORAGE_KEY="quarter-manager-layout-v12";
const MAX_PLAYERS=20;
const QUARTERS=["1Q","2Q","3Q","4Q"];
const SLOT_KEYS=Array.from({length:25},(_,i)=>`S${i+1}`);
const GK_SLOT="S23";
const DEFAULT_NAMES=[];
const $=id=>document.getElementById(id);

function createEmptyQuarter(){const q={};SLOT_KEYS.forEach(k=>q[k]="");return q}
function initialState(){
  const quarters={};
  QUARTERS.forEach(q=>quarters[q]=createEmptyQuarter());
  return {players:[...DEFAULT_NAMES],activeQuarter:"1Q",selectedPlayer:"",deleteMode:false,quarters}
}
function load(){
  try{
    const raw=localStorage.getItem(STORAGE_KEY);
    if(!raw)return initialState();
    const parsed=JSON.parse(raw);
    const quarters={};
    QUARTERS.forEach(q=>quarters[q]={...createEmptyQuarter(),...((parsed.quarters&&parsed.quarters[q])||{})});
    return {
      players:Array.isArray(parsed.players)?parsed.players.slice(0,MAX_PLAYERS):[...DEFAULT_NAMES],
      activeQuarter:QUARTERS.includes(parsed.activeQuarter)?parsed.activeQuarter:"1Q",
      selectedPlayer:parsed.selectedPlayer||"",
      deleteMode:!!parsed.deleteMode,
      quarters
    }
  }catch{return initialState()}
}
let state=load();

function save(){localStorage.setItem(STORAGE_KEY,JSON.stringify(state))}
function normalize(v){return String(v||"").trim()}
function fieldQuarterCount(player){
  return QUARTERS.reduce((sum,q)=>sum+Object.entries(state.quarters[q]).filter(([key,val])=>key!==GK_SLOT&&normalize(val)===player).length,0)
}
function gkQuarterCount(player){
  return QUARTERS.reduce((sum,q)=>sum+(normalize(state.quarters[q][GK_SLOT])===player?1:0),0)
}
function duplicateNames(q){
  const counts={};
  Object.values(state.quarters[q]).forEach(v=>{const n=normalize(v);if(!n)return;counts[n]=(counts[n]||0)+1});
  return new Set(Object.keys(counts).filter(name=>counts[name]>1))
}
function assignedNamesForQuarter(q){return new Set(Object.values(state.quarters[q]).map(normalize).filter(Boolean))}
function resters(q){
  const assigned=assignedNamesForQuarter(q);
  return state.players.filter(name=>!assigned.has(name))
}
function addPlayer(){
  const input=$("nameInput");
  const name=normalize(input.value);
  if(!name)return;
  if(state.players.includes(name)){input.value="";return}
  if(state.players.length>=MAX_PLAYERS){alert("최대 20명까지 추가할 수 있습니다.");return}
  state.players.push(name);
  input.value="";
  render()
}
function removePlayer(name){
  state.players=state.players.filter(p=>p!==name);
  QUARTERS.forEach(q=>{
    Object.keys(state.quarters[q]).forEach(k=>{
      if(normalize(state.quarters[q][k])===name)state.quarters[q][k]=""
    })
  });
  if(state.selectedPlayer===name)state.selectedPlayer="";
  render()
}
function selectPlayer(name){
  if(state.deleteMode){removePlayer(name);return}
  state.selectedPlayer=state.selectedPlayer===name?"":name;
  render()
}
function setQuarter(q){state.activeQuarter=q;state.selectedPlayer="";render()}
function clearCurrentQuarter(){
  if(!confirm(`${state.activeQuarter}를 초기화할까요?`))return;
  state.quarters[state.activeQuarter]=createEmptyQuarter();
  state.selectedPlayer="";
  render()
}
function copyToNextQuarter(){
  const idx=QUARTERS.indexOf(state.activeQuarter);
  if(idx>=QUARTERS.length-1)return;
  const nextQ=QUARTERS[idx+1];
  state.quarters[nextQ]={...state.quarters[state.activeQuarter]};
  state.activeQuarter=nextQ;
  state.selectedPlayer="";
  render()
}
function toggleDeleteMode(){
  state.deleteMode=!state.deleteMode;
  if(state.deleteMode)state.selectedPlayer="";
  render()
}
function handleSlotClick(slotKey){
  const current=state.quarters[state.activeQuarter][slotKey];
  if(state.selectedPlayer){
    state.quarters[state.activeQuarter][slotKey]=state.selectedPlayer;
    state.selectedPlayer=""
  }else if(current){
    state.quarters[state.activeQuarter][slotKey]=""
  }
  render()
}
function renderQuarterTabs(){
  const wrap=$("quarterTabs");
  wrap.innerHTML="";
  QUARTERS.forEach(q=>{
    const btn=document.createElement("button");
    btn.className="quarter-tab"+(state.activeQuarter===q?" active":"");
    btn.textContent=q;
    btn.addEventListener("click",()=>setQuarter(q));
    wrap.appendChild(btn)
  })
}
function renderAttendees(){
  const grid=$("attendeeGrid");
  grid.innerHTML="";
  const list=state.players.slice();
  while(list.length<MAX_PLAYERS)list.push("");
  list.forEach(name=>{
    const btn=document.createElement("button");
    btn.className="attendee"+(name&&state.selectedPlayer===name?" selected":"")+(name&&state.deleteMode?" delete-target":"")+(!name?" empty":"");
    if(name){
      const field=fieldQuarterCount(name);
      const gk=gkQuarterCount(name);
      btn.innerHTML=gk>0
        ? `${name} <span class="main-num">(${field}</span><span class="slash">/</span><span class="gk-num">${gk}</span><span class="main-num">)</span>`
        : `${name} <span class="main-num">(${field})</span>`;
      btn.addEventListener("click",()=>selectPlayer(name))
    }
    grid.appendChild(btn)
  });
  $("countBox").textContent=String(state.players.length);
  $("deleteModeBtn").classList.toggle("active",state.deleteMode)
}
function renderField(){
  const grid=$("fieldGrid");
  const q=state.activeQuarter;
  const dups=duplicateNames(q);
  grid.innerHTML="";
  SLOT_KEYS.forEach(slotKey=>{
    const name=state.quarters[q][slotKey];
    const div=document.createElement("div");
    div.className="slot"+(name?" filled":"")+(name&&dups.has(normalize(name))?" dup":"");
    if(name){
      if(slotKey===GK_SLOT){
        div.innerHTML=`<div>${name}</div><div class="gk-label">GK</div>`
      }else{
        div.textContent=name
      }
    }else if(slotKey===GK_SLOT){
      div.innerHTML=`<div class="gk-label">GK</div>`
    }else{
      div.textContent=""
    }
    div.addEventListener("click",()=>handleSlotClick(slotKey));
    grid.appendChild(div)
  })
}
function renderRest(){
  const grid=$("restGrid");
  grid.innerHTML="";
  const label=document.createElement("div");
  label.className="rest-cell rest-label";
  label.textContent="휴식";
  grid.appendChild(label);
  resters(state.activeQuarter).forEach(name=>{
    const div=document.createElement("div");
    div.className="rest-cell";
    div.textContent=name;
    grid.appendChild(div)
  })
}
function render(){
  save();
  renderQuarterTabs();
  renderAttendees();
  renderField();
  renderRest()
}
$("addBtn").addEventListener("click",addPlayer);
$("nameInput").addEventListener("keydown",e=>{if(e.key==="Enter")addPlayer()});
$("clearQuarterBtn").addEventListener("click",clearCurrentQuarter);
$("copyNextBtn").addEventListener("click",copyToNextQuarter);
$("deleteModeBtn").addEventListener("click",toggleDeleteMode);
render();
})();
</script>
</body>
</html>
