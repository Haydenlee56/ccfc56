<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Football Quarter Manager</title>
<style>
@import url("https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css");

:root{
  --w:min(100vw,430px);
  --label-w:52px;
  --count-w:38px;
  --add-w:48px;
  --del-w:36px;
  --seg-w:46px;
  --group-gap:10px;
  --rest-gap:6px;

  --bg:#05070b;
  --bg2:#0b0e13;
  --panel:#1a1d22;
  --panel2:#101318;
  --panel-line:#434951;
  --panel-edge:#090b0e;

  --field-panel:#0d1013;
  --field-panel2:#07090c;
  --field-panel-line:#2c3138;

  --box-top:#5d6670;
  --box-mid:#404850;
  --box-bot:#252b31;
  --box-line:#101419;
  --box-hi:rgba(255,255,255,.18);
  --box-lo:rgba(0,0,0,.65);

  --tool-top:#6e7883;
  --tool-mid:#48515b;
  --tool-bot:#242a31;
  --tool-line:#0d1116;

  --chip-top:#f8fbfd;
  --chip-bot:#cfd9e0;
  --chip-line:#96a1ac;
  --chip-text:#0f1720;

  --rest-top:#d8dfe6;
  --rest-bot:#9ca6b1;
  --rest-line:#717b86;
  --rest-text:#0f1720;

  --field-dark:#17371d;
  --field-mid:#2f6031;
  --field-light:#446d43;
  --field-line:rgba(232,241,232,.42);
  --slot-line:rgba(255,255,255,.16);

  --text:#f0f3f6;
  --muted:#929aa5;
  --gold:#d0a442;
  --danger:#c93a3a;
  --danger2:#711616;
  --danger-line:#ff8f8f;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{
  margin:0;
  background:
    radial-gradient(circle at 50% -10%, rgba(255,255,255,.06), transparent 22%),
    linear-gradient(180deg, #0a0d12 0%, var(--bg) 40%, #030406 100%);
  color:var(--text);
  font-family:"Pretendard",system-ui,sans-serif;
  display:flex;
  justify-content:center;
  align-items:flex-start;
}
.app{width:var(--w);min-height:100dvh;padding:8px}
.frame{min-height:calc(100dvh - 16px);display:flex;flex-direction:column;gap:8px}

.panel,
.field-panel{
  position:relative;
  border:1px solid var(--panel-line);
  background:
    linear-gradient(180deg, rgba(255,255,255,.04), rgba(255,255,255,0) 10%),
    linear-gradient(180deg,var(--panel),var(--panel2));
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,.04),
    inset 0 -1px 0 rgba(0,0,0,.7),
    0 0 0 1px var(--panel-edge),
    0 8px 24px rgba(0,0,0,.55);
  padding:10px;
}
.field-panel{
  background:
    linear-gradient(180deg, rgba(255,255,255,.03), rgba(255,255,255,0) 10%),
    linear-gradient(180deg,var(--field-panel),var(--field-panel2));
  border-color:var(--field-panel-line);
}
.brand{text-align:center;margin-bottom:8px}
.brand-badge{
  display:inline-block;
  padding:4px 14px 5px;
  font-size:14px;
  font-weight:900;
  letter-spacing:.35px;
  color:#eef3f7;
  border:none;
  background:
    linear-gradient(180deg, rgba(255,255,255,.09), rgba(255,255,255,0) 32%),
    linear-gradient(180deg,#1e2530,#11161d);
  box-shadow:
    0 0 0 1px rgba(255,255,255,.08),
    0 8px 20px rgba(0,0,0,.28),
    inset 0 1px 0 rgba(255,255,255,.06),
    inset 0 -1px 0 rgba(0,0,0,.45);
  text-shadow:0 1px 0 rgba(0,0,0,.55);
  border-radius:2px;
}

.box,.quarter-tab,.tool-btn{
  display:flex;align-items:center;justify-content:center;
  height:34px;
  border:none;
  background:
    linear-gradient(180deg, rgba(255,255,255,.10), rgba(255,255,255,0) 35%),
    linear-gradient(180deg,#3b424b,#262c33);
  color:#f2f5f7;
  font-size:12px;
  font-weight:700;
  box-shadow:
    0 0 0 1px rgba(255,255,255,.08),
    0 8px 18px rgba(0,0,0,.34),
    inset 0 1px 0 rgba(255,255,255,.09),
    inset 0 -1px 0 rgba(0,0,0,.34);
  user-select:none;
  text-shadow:0 1px 0 rgba(0,0,0,.35);
  border-radius:3px;
}
.box.clickable,.quarter-tab,.tool-btn{cursor:pointer}
.box:active,.quarter-tab:active,.tool-btn:active{
  transform:translateY(1px);
  box-shadow:
    inset 0 2px 5px rgba(0,0,0,.5),
    inset 0 1px 0 rgba(255,255,255,.06);
}
.tool-btn,.tool-dark{
  border-color:#73808d;
  background:
    linear-gradient(180deg, rgba(255,255,255,.08), rgba(255,255,255,0) 35%),
    linear-gradient(180deg,#232931,#171c22);
}
.box.delete.active{
  background:
    linear-gradient(180deg, rgba(255,255,255,.09), rgba(255,255,255,0) 35%),
    linear-gradient(180deg,var(--danger),var(--danger2));
  color:#fff;
  border:none;
}

.top-row{
  display:grid;
  grid-template-columns:auto minmax(0,1fr) auto;
  column-gap:var(--group-gap);
  align-items:center;
  margin-bottom:8px;
}
.top-pair{
  display:grid;
  grid-template-columns:var(--label-w) var(--count-w);
  gap:0;
}
.top-pair .box + .box{border-left:none}
.action-pair{
  display:grid;
  grid-template-columns:var(--add-w) var(--del-w);
  gap:0;
  justify-content:end;
}
.action-pair .box + .box{border-left:none}

.name-input{
  width:100%;
  height:34px;
  min-width:0;
  border:1px solid #cbd2d8;
  background:
    linear-gradient(180deg, rgba(255,255,255,.45), rgba(255,255,255,0) 40%),
    #eef1f3;
  text-align:center;
  font-size:13px;
  font-weight:700;
  color:#10161f;
  outline:none;
  box-shadow:inset 0 1px 0 rgba(255,255,255,.50), 0 2px 5px rgba(0,0,0,.15);
  border-radius:0;
  padding:0;
}
.name-input::placeholder{color:#6b7280}

.attendees-grid{
  display:grid;
  grid-template-columns:repeat(5,1fr);
  gap:6px;
}
.attendee{
  height:36px;
  border:none;
  background:
    linear-gradient(180deg, rgba(255,255,255,.82), rgba(255,255,255,0) 26%),
    linear-gradient(180deg,var(--chip-top),var(--chip-bot));
  color:var(--chip-text);
  font-size:12px;
  font-weight:700;
  display:flex;
  align-items:center;
  justify-content:center;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
  padding:0 4px;
  box-shadow:
    0 0 0 1px rgba(17,24,39,.10),
    inset 0 1px 0 rgba(255,255,255,.9),
    inset 0 -1px 0 rgba(0,0,0,.08),
    0 2px 5px rgba(0,0,0,.22);
  cursor:pointer;
  border-radius:3px;
}
.attendee.selected{
  border-color:#7ec98d;
  background:
    linear-gradient(180deg, rgba(255,255,255,.16), rgba(255,255,255,0) 24%),
    linear-gradient(180deg,#2a8b42,#15562a);
  color:#fff;
}
.attendee.delete-target{
  border-color:#f2a4a4;
  background:
    linear-gradient(180deg, rgba(255,255,255,.18), rgba(255,255,255,0) 24%),
    linear-gradient(180deg,#ffdcdc,#f2b9b9);
  color:#6f1515;
}
.attendee.empty{visibility:hidden;pointer-events:none}
.attendee .main-num{color:#111827}
.attendee.selected .main-num{color:#fff}
.attendee .slash{color:#111827}
.attendee.selected .slash{color:#fff}
.attendee .gk-num{color:var(--gold)}

.field-header{
  display:grid;
  grid-template-columns:calc(70px + (var(--group-gap) * 3)) calc(var(--seg-w) * 2) minmax(0,1fr);
  column-gap:var(--group-gap);
  align-items:center;
  margin-bottom:8px;
}
.field-header > .box{width:100%;}
.field-header > .tool-pair{width:100%;}
.field-header > .quarter-tabs{width:100%;}
.tool-pair{
  display:grid;
  grid-template-columns:var(--seg-w) var(--seg-w);
  gap:0;
}
.tool-pair .tool-btn + .tool-btn{border-left:none}
.quarter-tabs{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:0;}
.quarter-tab{width:100%;}
.quarter-tab + .quarter-tab{border-left:none;}
.quarter-tab.active{
  background:
    linear-gradient(180deg, rgba(255,255,255,.12), rgba(255,255,255,0) 35%),
    linear-gradient(180deg,#151d27,#0e141b);
  color:#fff;
  border:none;
}

.field{
  position:relative;
  overflow:hidden;
  border:1px solid #364038;
  height:48svh;
  max-height:390px;
  min-height:250px;
  box-shadow:
    inset 0 0 0 1px rgba(255,255,255,.05),
    inset 0 0 26px rgba(0,0,0,.45),
    0 0 0 1px rgba(0,0,0,.75),
    0 4px 16px rgba(0,0,0,.55);
  background:
    linear-gradient(90deg,
      rgba(255,255,255,.05) 0%, rgba(255,255,255,.015) 10%,
      rgba(255,255,255,.05) 20%, rgba(255,255,255,.015) 30%,
      rgba(255,255,255,.05) 40%, rgba(255,255,255,.015) 50%,
      rgba(255,255,255,.05) 60%, rgba(255,255,255,.015) 70%,
      rgba(255,255,255,.05) 80%, rgba(255,255,255,.015) 90%,
      rgba(255,255,255,.05) 100%),
    linear-gradient(0deg,
      rgba(255,255,255,.03) 0%, rgba(255,255,255,0) 16.666%,
      rgba(255,255,255,.03) 33.333%, rgba(255,255,255,0) 50%,
      rgba(255,255,255,.03) 66.666%, rgba(255,255,255,0) 83.333%,
      rgba(255,255,255,.03) 100%),
    linear-gradient(90deg,
      rgba(0,0,0,.10) 0 20%, rgba(255,255,255,.03) 20% 40%, rgba(0,0,0,.08) 40% 60%, rgba(255,255,255,.025) 60% 80%, rgba(0,0,0,.10) 80% 100%),
    radial-gradient(circle at 50% 45%, rgba(255,255,255,.06), transparent 35%),
    radial-gradient(circle at center, transparent 50%, rgba(0,0,0,.40) 100%),
    linear-gradient(180deg, var(--field-light) 0%, var(--field-mid) 46%, var(--field-dark) 100%);
}
.field::after{
  content:"";
  position:absolute;
  inset:0;
  pointer-events:none;
  background:
    radial-gradient(circle at center, transparent 65%, rgba(0,0,0,.28) 100%),
    repeating-linear-gradient(0deg, rgba(255,255,255,.015) 0 1px, transparent 1px 3px),
    repeating-linear-gradient(90deg, rgba(0,0,0,.02) 0 1px, transparent 1px 4px);
  mix-blend-mode:normal;
}
.field::before{
  content:"";
  position:absolute;
  left:0;top:50%;
  transform:translateY(-50%);
  width:100%;height:2px;
  background:var(--field-line);
  box-shadow:0 0 2px rgba(255,255,255,.08);
}
.center-circle{
  position:absolute;
  width:94px;height:94px;
  border:2px solid var(--field-line);
  border-radius:50%;
  left:50%;top:50%;
  transform:translate(-50%,-50%);
}
.center-dot{
  position:absolute;
  width:6px;height:6px;
  border-radius:50%;
  background:rgba(232,241,232,.42);
  left:50%;top:50%;
  transform:translate(-50%,-50%);
}
.penalty-top,.penalty-bottom{
  position:absolute;
  left:50%;
  transform:translateX(-50%);
  width:138px;height:58px;
  border:2px solid var(--field-line);
  opacity:.95;
}
.penalty-top{top:0;border-top:none}
.penalty-bottom{bottom:0;border-bottom:none}
.arc-top,.arc-bottom{
  position:absolute;
  left:50%;
  width:126px;height:62px;
  opacity:.72;
}
.arc-top{
  top:56px;
  transform:translateX(-50%);
  border:2px solid var(--field-line);
  border-left:none;border-right:none;border-top:none;
  border-radius:0 0 126px 126px;
}
.arc-bottom{
  bottom:56px;
  transform:translateX(-50%);
  border:2px solid var(--field-line);
  border-left:none;border-right:none;border-bottom:none;
  border-radius:126px 126px 0 0;
}

.field-grid{
  position:absolute;
  inset:10px;
  display:grid;
  grid-template-columns:repeat(5,1fr);
  grid-template-rows:repeat(5,1fr);
  gap:6px;
}
.slot{
  border:1px dashed var(--slot-line);
  background:transparent;
  display:flex;
  align-items:center;
  justify-content:center;
  flex-direction:column;
  font-size:15px;
  font-weight:700;
  color:#f4f7f9;
  text-align:center;
  padding:2px;
  cursor:pointer;
  user-select:none;
  text-shadow:0 1px 2px rgba(0,0,0,.85);
  box-shadow:none;
}
.slot.filled{background:transparent}
.slot:hover{
  background:rgba(255,255,255,.035);
  border-color:rgba(255,255,255,.30);
  box-shadow:
    inset 0 0 0 1px rgba(255,255,255,.04),
    0 0 14px rgba(255,255,255,.04);
}
.slot.dup{
  background:rgba(93,14,14,.35);
  border-color:#f0a3a3;
  color:#fff1f1;
}
.gk-label{
  color:var(--gold);
  font-size:10px;
  font-weight:900;
  letter-spacing:.3px;
  margin-top:2px;
  line-height:1;
  text-shadow:
    0 1px 2px rgba(0,0,0,.95),
    0 0 8px rgba(192,139,20,.18);
}

.rest-grid{
  display:grid;
  grid-template-columns:var(--label-w) repeat(5,minmax(0,1fr));
  column-gap:var(--rest-gap);
  row-gap:var(--rest-gap);
  align-items:stretch;
}
.rest-label{
  width:100%;
  height:34px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:12px;
  font-weight:700;
  background:
    linear-gradient(180deg, rgba(255,255,255,.055), rgba(255,255,255,0) 34%),
    linear-gradient(180deg,#3b424b,#262c33);
  border:none;
  color:#f2f5f7;
  box-shadow:
    0 0 0 1px rgba(255,255,255,.08),
    0 6px 14px rgba(0,0,0,.30),
    inset 0 1px 0 rgba(255,255,255,.09),
    inset 0 -1px 0 rgba(0,0,0,.34);
  border-radius:3px;
}
.rest-cell{
  width:100%;
  min-width:0;
  height:36px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:12px;
  font-weight:700;
  padding:0 4px;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
  border:none;
  background:
    linear-gradient(180deg, rgba(255,255,255,.38), rgba(255,255,255,0) 28%),
    linear-gradient(180deg,#edf0f2,#dde4e8);
  color:#10161f;
  box-shadow:0 2px 6px rgba(0,0,0,.18);
  border-radius:3px;
}
.credit{text-align:center;color:var(--muted);font-size:10px;margin-top:auto;padding-top:2px;letter-spacing:.15px}

@media (max-width:380px){
  .box,.quarter-tab,.tool-btn{font-size:11px}
  .attendee{font-size:11px}
  .slot{font-size:14px}
  .rest-cell,.rest-label{font-size:11px}
  .field-header{grid-template-columns:calc(64px + (var(--group-gap) * 3)) calc(42px * 2) minmax(0,1fr);}
  .tool-pair{grid-template-columns:42px 42px}
  .top-row{grid-template-columns:auto minmax(0,1fr) auto}
  .action-pair{grid-template-columns:42px 34px}
  .rest-grid{grid-template-columns:52px repeat(5,minmax(0,1fr))}
}
</style>
</head>
<body>
<div class="app">
  <div class="frame">
    <div class="panel">
      <div class="brand"><span class="brand-badge">Football Quarter Manager</span></div>
      <div class="top-row">
        <div class="top-pair">
          <div class="box">참석자</div>
          <div id="countBox" class="box">0</div>
        </div>
        <input id="nameInput" class="name-input" placeholder="이름 입력" maxlength="12" />
        <div class="action-pair">
          <div id="addBtn" class="box clickable">추가</div>
          <div id="deleteModeBtn" class="box delete tool-dark clickable">삭제</div>
        </div>
      </div>
      <div id="attendeeGrid" class="attendees-grid"></div>
    </div>

    <div class="field-panel">
      <div class="field-header">
        <div class="box">포메이션</div>
        <div class="tool-pair">
          <div id="clearQuarterBtn" class="tool-btn tool-dark">리셋</div>
          <div id="copyNextBtn" class="tool-btn tool-dark">복사</div>
        </div>
        <div id="quarterTabs" class="quarter-tabs"></div>
      </div>

      <div class="field">
        <div class="penalty-top"></div>
        <div class="penalty-bottom"></div>
        <div class="arc-top"></div>
        <div class="arc-bottom"></div>
        <div class="center-circle"></div>
        <div class="center-dot"></div>
        <div id="fieldGrid" class="field-grid"></div>
      </div>
    </div>

    <div class="panel">
      <div id="restGrid" class="rest-grid"></div>
    </div>

    <div class="credit">Hayden Lee</div>
  </div>
</div>

<script>
(() => {
const STORAGE_KEY="quarter-manager-layout-v29";
const MAX_PLAYERS=20;
const QUARTERS=["1Q","2Q","3Q","4Q"];
const SLOT_KEYS=Array.from({length:25},(_,i)=>`S${i+1}`);
const GK_SLOT="S23";
const $=id=>document.getElementById(id);

function createEmptyQuarter(){const q={};SLOT_KEYS.forEach(k=>q[k]="");return q}
function initialState(){const quarters={};QUARTERS.forEach(q=>quarters[q]=createEmptyQuarter());return{players:[],activeQuarter:"1Q",selectedPlayer:"",deleteMode:false,quarters}}
function load(){try{const raw=localStorage.getItem(STORAGE_KEY);if(!raw)return initialState();const parsed=JSON.parse(raw);const quarters={};QUARTERS.forEach(q=>quarters[q]={...createEmptyQuarter(),...((parsed.quarters&&parsed.quarters[q])||{})});return{players:Array.isArray(parsed.players)?parsed.players.slice(0,MAX_PLAYERS):[],activeQuarter:QUARTERS.includes(parsed.activeQuarter)?parsed.activeQuarter:"1Q",selectedPlayer:parsed.selectedPlayer||"",deleteMode:!!parsed.deleteMode,quarters}}catch{return initialState()}}
let state=load();

function save(){localStorage.setItem(STORAGE_KEY,JSON.stringify(state))}
function normalize(v){return String(v||"").trim()}
function fieldQuarterCount(player){return QUARTERS.reduce((sum,q)=>sum+Object.entries(state.quarters[q]).filter(([key,val])=>key!==GK_SLOT&&normalize(val)===player).length,0)}
function gkQuarterCount(player){return QUARTERS.reduce((sum,q)=>sum+(normalize(state.quarters[q][GK_SLOT])===player?1:0),0)}
function duplicateNames(q){const counts={};Object.values(state.quarters[q]).forEach(v=>{const n=normalize(v);if(!n)return;counts[n]=(counts[n]||0)+1});return new Set(Object.keys(counts).filter(name=>counts[name]>1))}
function assignedNamesForQuarter(q){return new Set(Object.values(state.quarters[q]).map(normalize).filter(Boolean))}
function resters(q){const assigned=assignedNamesForQuarter(q);return state.players.filter(name=>!assigned.has(name))}
function addPlayer(){const input=$("nameInput"),name=normalize(input.value);if(!name)return;if(state.players.includes(name)){input.value="";return}if(state.players.length>=MAX_PLAYERS){alert("최대 20명까지 추가할 수 있습니다.");return}state.players.push(name);input.value="";render()}
function removePlayer(name){state.players=state.players.filter(p=>p!==name);QUARTERS.forEach(q=>{Object.keys(state.quarters[q]).forEach(k=>{if(normalize(state.quarters[q][k])===name)state.quarters[q][k]=""})});if(state.selectedPlayer===name)state.selectedPlayer="";render()}
function selectPlayer(name){if(state.deleteMode){removePlayer(name);return}state.selectedPlayer=state.selectedPlayer===name?"":name;render()}
function setQuarter(q){state.activeQuarter=q;state.selectedPlayer="";render()}
function clearCurrentQuarter(){if(!confirm(`${state.activeQuarter}를 초기화할까요?`))return;state.quarters[state.activeQuarter]=createEmptyQuarter();state.selectedPlayer="";render()}
function copyToNextQuarter(){const idx=QUARTERS.indexOf(state.activeQuarter);if(idx>=QUARTERS.length-1)return;const nextQ=QUARTERS[idx+1];state.quarters[nextQ]={...state.quarters[state.activeQuarter]};state.activeQuarter=nextQ;state.selectedPlayer="";render()}
function toggleDeleteMode(){state.deleteMode=!state.deleteMode;if(state.deleteMode)state.selectedPlayer="";render()}
function handleSlotClick(slotKey){const current=state.quarters[state.activeQuarter][slotKey];if(state.selectedPlayer){state.quarters[state.activeQuarter][slotKey]=state.selectedPlayer;state.selectedPlayer=""}else if(current){state.quarters[state.activeQuarter][slotKey]=""}render()}
function renderQuarterTabs(){const wrap=$("quarterTabs");wrap.innerHTML="";QUARTERS.forEach(q=>{const btn=document.createElement("div");btn.className="quarter-tab box clickable"+(state.activeQuarter===q?" active":"");btn.textContent=q;btn.addEventListener("click",()=>setQuarter(q));wrap.appendChild(btn)})}
function renderAttendees(){const grid=$("attendeeGrid");grid.innerHTML="";const list=state.players.slice();while(list.length<MAX_PLAYERS)list.push("");list.forEach(name=>{const btn=document.createElement("button");btn.className="attendee"+(name&&state.selectedPlayer===name?" selected":"")+(name&&state.deleteMode?" delete-target":"")+(!name?" empty":"");if(name){const field=fieldQuarterCount(name),gk=gkQuarterCount(name);btn.innerHTML=gk>0?`${name} <span class="main-num">(${field}</span><span class="slash">/</span><span class="gk-num">${gk}</span><span class="main-num">)</span>`:`${name} <span class="main-num">(${field})</span>`;btn.addEventListener("click",()=>selectPlayer(name))}grid.appendChild(btn)});$("countBox").textContent=String(state.players.length);$("deleteModeBtn").classList.toggle("active",state.deleteMode)}
function renderField(){const grid=$("fieldGrid"),q=state.activeQuarter,dups=duplicateNames(q);grid.innerHTML="";SLOT_KEYS.forEach(slotKey=>{const name=state.quarters[q][slotKey];const div=document.createElement("div");div.className="slot"+(name?" filled":"")+(name&&dups.has(normalize(name))?" dup":"");if(name){if(slotKey===GK_SLOT){div.innerHTML=`<div>${name}</div><div class="gk-label">GK</div>`}else{div.textContent=name}}else if(slotKey===GK_SLOT){div.innerHTML=`<div class="gk-label">GK</div>`}div.addEventListener("click",()=>handleSlotClick(slotKey));grid.appendChild(div)})}
function renderRest(){
  const grid=$("restGrid");
  grid.innerHTML="";

  const label=document.createElement("div");
  label.className="rest-label";
  label.textContent="휴식";
  grid.appendChild(label);

  const names=resters(state.activeQuarter).slice(0,10);
  const firstRow=names.slice(0,5);
  const secondRow=names.slice(5,10);

  firstRow.forEach(name=>{
    const div=document.createElement("div");
    div.className="rest-cell";
    div.textContent=name;
    grid.appendChild(div);
  });

  if(secondRow.length){
    const spacer=document.createElement("div");
    spacer.style.visibility="hidden";
    spacer.style.pointerEvents="none";
    grid.appendChild(spacer);

    secondRow.forEach(name=>{
      const div=document.createElement("div");
      div.className="rest-cell";
      div.textContent=name;
      grid.appendChild(div);
    });
  }
}
function render(){save();renderQuarterTabs();renderAttendees();renderField();renderRest()}
$("addBtn").addEventListener("click",addPlayer);
$("nameInput").addEventListener("keydown",e=>{if(e.key==="Enter")addPlayer()});
$("deleteModeBtn").addEventListener("click",toggleDeleteMode);
$("clearQuarterBtn").addEventListener("click",clearCurrentQuarter);
$("copyNextBtn").addEventListener("click",copyToNextQuarter);
render();
})();
</script>
</body>
</html>
