<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Football Quarter Manager</title>
<style>
@import url("https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css");
:root{
--bg:#07111f;--shell:#0a1628;--panel:#121a27;--panel2:#161f2d;--line:#243142;--text:#edf2f7;--muted:#95a3b8;
--chip:#f3f4f6;--chiptext:#111827;--chipsel:#16a34a;--chipseltext:#fff;--field:#0d5d1f;--field2:#0a4b18;
--fieldline:rgba(255,255,255,.36);--slotline:rgba(255,255,255,.38);--gold:#b8860b;--shadow:0 10px 24px rgba(0,0,0,.24);--w:min(100vw,430px)}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{margin:0;background:linear-gradient(180deg,#030712 0%,#07111f 100%);font-family:"Pretendard",system-ui,sans-serif;color:var(--text);display:flex;justify-content:center;align-items:flex-start}
.app{width:var(--w);min-height:100dvh;padding:10px}
.frame{background:linear-gradient(180deg,var(--shell),#081220);border:1px solid #0b6ba8;border-radius:28px;padding:10px;min-height:calc(100dvh - 20px);display:flex;flex-direction:column;gap:10px;box-shadow:0 0 0 1px rgba(10,107,168,.18) inset}
.panel{background:linear-gradient(180deg,var(--panel),var(--panel2));border:1px solid var(--line);border-radius:14px;padding:10px;box-shadow:var(--shadow)}
.brand{display:flex;justify-content:center;margin-bottom:8px}
.brand-badge{background:rgba(255,255,255,.08);border:1px solid var(--line);border-radius:0 0 10px 10px;padding:9px 18px 8px;font-size:15px;font-weight:700;color:#f8fafc}
.input-row{display:grid;grid-template-columns:58px 38px 1fr 46px;gap:6px;margin-bottom:8px}
.label-box,.add-btn,.count-box,.quarter-tab,.mini-title,.tool-btn{display:flex;align-items:center;justify-content:center;border-radius:0;font-weight:700;height:34px;font-size:12px;line-height:1;background:rgba(255,255,255,.10);color:#f3f4f6;border:1px solid var(--line)}
.name-input{width:100%;height:34px;border-radius:0;border:1px solid var(--line);background:#f3f4f6;color:#0f172a;font-size:13px;font-weight:600;padding:0 8px;outline:none;text-align:center}
.name-input::placeholder{color:#6b7280;font-weight:600}
.add-btn,.tool-btn,.quarter-tab{cursor:pointer}
.attendees-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:6px}
.attendee{position:relative;height:36px;border:none;border-radius:0;background:var(--chip);color:var(--chiptext);font-size:12px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;padding:0 16px 0 4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;gap:0}
.attendee.selected{background:var(--chipsel);color:var(--chipseltext);box-shadow:0 0 0 1px rgba(255,255,255,.12) inset}
.attendee .main-num{color:#111827}.attendee.selected .main-num{color:#fff}.attendee .slash{color:#111827}.attendee.selected .slash{color:#fff}.attendee .gk-num{color:var(--gold)}
.attendee.empty{visibility:hidden;pointer-events:none}
.del-btn{position:absolute;right:2px;top:2px;width:12px;height:12px;border:none;background:transparent;color:#64748b;font-size:10px;line-height:1;padding:0;cursor:pointer}
.attendee.selected .del-btn{color:#e5e7eb}
.field-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;gap:8px}
.field-left{display:flex;gap:6px;align-items:center}
.tabs{display:grid;grid-template-columns:repeat(4,1fr);gap:4px;width:190px;max-width:52%}
.quarter-tab{font-size:11px}.quarter-tab.active{background:#0f172a;border-color:#334155;color:#fff}
.tools{display:flex;gap:6px;margin-top:8px}
.tool-btn{height:28px;font-size:11px;padding:0 10px}
.field{position:relative;border-radius:12px;background:linear-gradient(180deg,var(--field),var(--field2));padding:12px 8px 8px;overflow:hidden}
.field:before{content:"";position:absolute;left:0;top:50%;transform:translateY(-50%);width:100%;height:1px;background:var(--fieldline);opacity:.7}
.center-circle{position:absolute;width:86px;height:86px;border-radius:50%;border:1.5px solid var(--fieldline);left:50%;top:50%;transform:translate(-50%,-50%);opacity:.65}
.penalty-top,.penalty-bottom{position:absolute;left:50%;transform:translateX(-50%);width:132px;height:56px;border:1.5px solid var(--fieldline);opacity:.62}
.penalty-top{top:0;border-top:none}.penalty-bottom{bottom:0;border-bottom:none}
.field-grid{position:relative;z-index:1;display:grid;grid-template-columns:repeat(5,1fr);grid-template-rows:repeat(5,1fr);gap:5px;height:48svh;max-height:390px;min-height:250px}
.slot{border:1px dashed var(--slotline);border-radius:0;background:rgba(255,255,255,.02);color:#f8fafc;font-size:15px;font-weight:700;display:flex;align-items:center;justify-content:center;text-align:center;padding:2px;cursor:pointer;user-select:none;overflow:hidden;word-break:keep-all;line-height:1.05;flex-direction:column}
.slot.filled{background:rgba(255,255,255,.06)}.slot.dup{background:#fee2e2;border-color:#fca5a5;color:#7f1d1d}
.gk-label{font-size:9px;color:var(--gold);font-weight:700;line-height:1;margin-top:2px}
.rest-grid{display:flex;flex-wrap:wrap;gap:6px;margin-top:0}
.rest-cell{min-width:74px;height:34px;border-radius:0;background:#e5e7eb;color:#0f172a;font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center;padding:0 8px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.rest-label{background:rgba(255,255,255,.10);color:#f9fafb;border:1px solid var(--line);min-width:58px}
.credit{text-align:center;color:var(--muted);font-size:10px;margin-top:auto;padding-top:2px}
@media (max-width:380px){.brand-badge{font-size:14px;padding:8px 14px 7px}.attendee{font-size:11px}.rest-cell{font-size:11px;min-width:66px}.slot{font-size:14px}.field-grid{height:44svh}.tabs{max-width:58%}.tool-btn{font-size:10px;padding:0 8px}}
</style>
</head>
<body>
<div class="app"><div class="frame">
<div class="panel">
<div class="brand"><div class="brand-badge">Football Quarter Manager</div></div>
<div class="input-row">
<div class="label-box">참석자</div>
<div id="countBox" class="count-box">0</div>
<input id="nameInput" class="name-input" placeholder="이름 입력" maxlength="12" />
<button id="addBtn" class="add-btn">추가</button>
</div>
<div id="attendeeGrid" class="attendees-grid"></div>
</div>

<div class="panel">
<div class="field-header">
<div class="field-left"><div class="mini-title" style="width:92px;">포메이션</div></div>
<div id="quarterTabs" class="tabs"></div>
</div>
<div class="field">
<div class="penalty-top"></div><div class="penalty-bottom"></div><div class="center-circle"></div>
<div id="fieldGrid" class="field-grid"></div>
</div>
<div class="tools">
<button id="clearQuarterBtn" class="tool-btn">현재 쿼터 초기화</button>
<button id="copyNextBtn" class="tool-btn">다음 쿼터 복사</button>
</div>
</div>

<div class="panel"><div id="restGrid" class="rest-grid"></div></div>
<div class="credit">Hayden Lee</div>
</div></div>

<script>
(() => {
const STORAGE_KEY="quarter-manager-layout-v10";
const MAX_PLAYERS=20;
const QUARTERS=["1Q","2Q","3Q","4Q"];
const SLOT_KEYS=Array.from({length:25},(_,i)=>`S${i+1}`);
const GK_SLOT="S23";
const DEFAULT_NAMES=[];
const $=id=>document.getElementById(id);

function createEmptyQuarter(){const q={};SLOT_KEYS.forEach(k=>q[k]="");return q}
function initialState(){const quarters={};QUARTERS.forEach(q=>quarters[q]=createEmptyQuarter());return{players:[...DEFAULT_NAMES],activeQuarter:"1Q",selectedPlayer:"",quarters}}
function load(){try{const raw=localStorage.getItem(STORAGE_KEY);if(!raw)return initialState();const parsed=JSON.parse(raw);const quarters={};QUARTERS.forEach(q=>quarters[q]={...createEmptyQuarter(),...((parsed.quarters&&parsed.quarters[q])||{})});return{players:Array.isArray(parsed.players)?parsed.players.slice(0,MAX_PLAYERS):[...DEFAULT_NAMES],activeQuarter:QUARTERS.includes(parsed.activeQuarter)?parsed.activeQuarter:"1Q",selectedPlayer:parsed.selectedPlayer||"",quarters}}catch{return initialState()}}
let state=load();
function save(){localStorage.setItem(STORAGE_KEY,JSON.stringify(state))}
function normalize(v){return String(v||"").trim()}
function fieldQuarterCount(player){return QUARTERS.reduce((sum,q)=>sum+Object.entries(state.quarters[q]).filter(([key,val])=>key!==GK_SLOT&&normalize(val)===player).length,0)}
function gkQuarterCount(player){return QUARTERS.reduce((sum,q)=>sum+(normalize(state.quarters[q][GK_SLOT])===player?1:0),0)}
function duplicateNames(q){const counts={};Object.values(state.quarters[q]).forEach(v=>{const n=normalize(v);if(!n)return;counts[n]=(counts[n]||0)+1});return new Set(Object.keys(counts).filter(name=>counts[name]>1))}
function assignedNamesForQuarter(q){return new Set(Object.values(state.quarters[q]).map(normalize).filter(Boolean))}
function resters(q){const assigned=assignedNamesForQuarter(q);return state.players.filter(name=>!assigned.has(name))}
function addPlayer(){const input=$("nameInput");const name=normalize(input.value);if(!name)return;if(state.players.includes(name)){input.value="";return}if(state.players.length>=MAX_PLAYERS){alert("최대 20명까지 추가할 수 있습니다.");return}state.players.push(name);input.value="";render()}
function removePlayer(name){state.players=state.players.filter(p=>p!==name);QUARTERS.forEach(q=>{Object.keys(state.quarters[q]).forEach(k=>{if(normalize(state.quarters[q][k])===name)state.quarters[q][k]=""})});if(state.selectedPlayer===name)state.selectedPlayer="";render()}
function selectPlayer(name){state.selectedPlayer=state.selectedPlayer===name?"":name;render()}
function setQuarter(q){state.activeQuarter=q;state.selectedPlayer="";render()}
function clearCurrentQuarter(){if(!confirm(`${state.activeQuarter}를 초기화할까요?`))return;state.quarters[state.activeQuarter]=createEmptyQuarter();state.selectedPlayer="";render()}
function copyToNextQuarter(){const idx=QUARTERS.indexOf(state.activeQuarter);if(idx>=QUARTERS.length-1)return;const nextQ=QUARTERS[idx+1];state.quarters[nextQ]={...state.quarters[state.activeQuarter]};state.activeQuarter=nextQ;state.selectedPlayer="";render()}
function handleSlotClick(slotKey){const current=state.quarters[state.activeQuarter][slotKey];if(state.selectedPlayer){state.quarters[state.activeQuarter][slotKey]=state.selectedPlayer;state.selectedPlayer=""}else if(current){state.quarters[state.activeQuarter][slotKey]=""}render()}
function renderQuarterTabs(){const wrap=$("quarterTabs");wrap.innerHTML="";QUARTERS.forEach(q=>{const btn=document.createElement("button");btn.className="quarter-tab"+(state.activeQuarter===q?" active":"");btn.textContent=q;btn.addEventListener("click",()=>setQuarter(q));wrap.appendChild(btn)})}
function renderAttendees(){const grid=$("attendeeGrid");grid.innerHTML="";const list=state.players.slice();while(list.length<MAX_PLAYERS)list.push("");list.forEach(name=>{const btn=document.createElement("button");btn.className="attendee"+(name&&state.selectedPlayer===name?" selected":"")+(!name?" empty":"");if(name){const field=fieldQuarterCount(name);const gk=gkQuarterCount(name);btn.innerHTML=gk>0?`${name} <span class="main-num">(${field}</span><span class="slash">/</span><span class="gk-num">${gk}</span><span class="main-num">)</span><button class="del-btn" aria-label="delete">×</button>`:`${name} <span class="main-num">(${field})</span><button class="del-btn" aria-label="delete">×</button>`;btn.addEventListener("click",()=>selectPlayer(name));btn.querySelector(".del-btn").addEventListener("click",e=>{e.stopPropagation();removePlayer(name)})}grid.appendChild(btn)});$("countBox").textContent=String(state.players.length)}
function renderField(){const grid=$("fieldGrid");const q=state.activeQuarter;const dups=duplicateNames(q);grid.innerHTML="";SLOT_KEYS.forEach(slotKey=>{const name=state.quarters[q][slotKey];const div=document.createElement("div");div.className="slot"+(name?" filled":"")+(name&&dups.has(normalize(name))?" dup":"");if(name){if(slotKey===GK_SLOT){div.innerHTML=`<div>${name}</div><div class="gk-label">GK</div>`}else{div.textContent=name}}else if(slotKey===GK_SLOT){div.innerHTML=`<div class="gk-label">GK</div>`}else{div.textContent=""}div.addEventListener("click",()=>handleSlotClick(slotKey));grid.appendChild(div)})}
function renderRest(){const grid=$("restGrid");grid.innerHTML="";const label=document.createElement("div");label.className="rest-cell rest-label";label.textContent="휴식";grid.appendChild(label);resters(state.activeQuarter).forEach(name=>{const div=document.createElement("div");div.className="rest-cell";div.textContent=name;grid.appendChild(div)})}
function render(){save();renderQuarterTabs();renderAttendees();renderField();renderRest()}
$("addBtn").addEventListener("click",addPlayer);
$("nameInput").addEventListener("keydown",e=>{if(e.key==="Enter")addPlayer()});
$("clearQuarterBtn").addEventListener("click",clearCurrentQuarter);
$("copyNextBtn").addEventListener("click",copyToNextQuarter);
render();
})();
</script>
</body>
</html>
