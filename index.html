<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Football Quarter Manager</title>
<style>
@import url("https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css");
:root{
  --bg:#070c14; --panel:#171a1d; --panel2:#101317; --panel-line:#2c333a;
  --box:#353b43; --box2:#252b31; --box-line:#4b555f;
  --tool:#22272d; --tool2:#171c21; --tool-line:#65707c;
  --text:#f2f5f7; --muted:#98a2ad;
  --field-panel:#06130c; --field-panel2:#07170f; --field-panel-line:#173122;
  --field:#1a6320; --field2:#0e4c16; --field-line:rgba(255,255,255,.17); --slot-line:rgba(255,255,255,.22);
  --chip:#edf0f2; --chip2:#dde4e8; --chip-text:#10161f; --chip-selected:#24964a; --chip-selected2:#18713a; --chip-selected-text:#fff;
  --gold:#c08b14; --danger:#c62f2f; --danger2:#8f1c1c; --danger-line:#dd6666;
  --shadow:0 10px 22px rgba(0,0,0,.48); --shadow-soft:0 4px 10px rgba(0,0,0,.34);
  --inset:inset 0 1px 0 rgba(255,255,255,.05), inset 0 -1px 0 rgba(0,0,0,.26);
  --w:min(100vw,430px); --label-w:52px; --count-w:38px; --add-w:46px; --del-w:36px; --seg-w:44px; --group-gap:10px;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{margin:0;background:radial-gradient(circle at top, rgba(255,255,255,.035), transparent 22%),linear-gradient(180deg,#04070d 0%, #070c14 100%);color:var(--text);font-family:"Pretendard",system-ui,sans-serif;display:flex;justify-content:center;align-items:flex-start}
.app{width:var(--w);min-height:100dvh;padding:8px}
.frame{min-height:calc(100dvh - 16px);display:flex;flex-direction:column;gap:8px}
.panel{background:radial-gradient(circle at center, rgba(255,255,255,.018), transparent 72%),linear-gradient(180deg, rgba(255,255,255,.028), rgba(255,255,255,0)),linear-gradient(180deg,var(--panel),var(--panel2));border:1px solid var(--panel-line);padding:10px;box-shadow:var(--shadow)}
.brand{text-align:center;margin-bottom:8px}
.brand-badge{display:inline-block;padding:4px 10px 5px;font-size:14px;font-weight:800;letter-spacing:.2px;background:linear-gradient(90deg, transparent, rgba(255,255,255,.06), transparent)}

.box,.quarter-tab,.tool-btn{display:flex;align-items:center;justify-content:center;height:34px;border:1px solid var(--box-line);background:linear-gradient(180deg, rgba(255,255,255,.055), rgba(255,255,255,0) 34%),linear-gradient(180deg,var(--box),var(--box2));color:var(--text);font-size:12px;font-weight:700;box-shadow:var(--shadow-soft), var(--inset);user-select:none}
.box.clickable,.quarter-tab,.tool-btn{cursor:pointer}
.box:active,.quarter-tab:active,.tool-btn:active{transform:translateY(1px);box-shadow:0 3px 8px rgba(0,0,0,.38), var(--inset)}
.tool-dark{border-color:var(--tool-line);background:linear-gradient(180deg, rgba(255,255,255,.045), rgba(255,255,255,0) 34%),linear-gradient(180deg,var(--tool),var(--tool2))}
.box.delete.active{background:linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,0) 35%),linear-gradient(180deg,var(--danger),var(--danger2));border-color:var(--danger-line)}

.top-row{display:grid;grid-template-columns:calc(var(--label-w) + var(--count-w)) minmax(0,1fr) var(--add-w) var(--del-w);column-gap:var(--group-gap);align-items:center;margin-bottom:8px}
.top-pair{display:grid;grid-template-columns:var(--label-w) var(--count-w);gap:0}
.top-pair .box + .box{border-left:none}
.name-input{width:100%;height:34px;min-width:0;border:1px solid #cbd2d8;background:linear-gradient(180deg, rgba(255,255,255,.35), rgba(255,255,255,0)),#eef1f3;text-align:center;font-size:13px;font-weight:700;color:#10161f;outline:none}
.name-input::placeholder{color:#6b7280}

.attendees-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:6px}
.attendee{height:36px;border:none;background:linear-gradient(180deg, rgba(255,255,255,.34), rgba(255,255,255,0) 28%),linear-gradient(180deg,var(--chip),var(--chip2));color:var(--chip-text);font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;padding:0 4px;box-shadow:0 2px 5px rgba(0,0,0,.18);cursor:pointer}
.attendee.selected{background:linear-gradient(180deg, rgba(255,255,255,.12), rgba(255,255,255,0) 28%),linear-gradient(180deg,var(--chip-selected),var(--chip-selected2));color:var(--chip-selected-text)}
.attendee.delete-target{background:linear-gradient(180deg, rgba(255,255,255,.14), rgba(255,255,255,0) 28%),linear-gradient(180deg,#ffd7d7,#ffc7c7);color:#7f1d1d}
.attendee.empty{visibility:hidden;pointer-events:none}
.attendee .main-num{color:#111827}.attendee.selected .main-num{color:#fff}.attendee .slash{color:#111827}.attendee.selected .slash{color:#fff}.attendee .gk-num{color:var(--gold)}

.field-panel{background:radial-gradient(circle at center, rgba(18,61,32,.18), transparent 72%),linear-gradient(180deg, rgba(255,255,255,.022), rgba(255,255,255,0)),linear-gradient(180deg,var(--field-panel),var(--field-panel2));border:1px solid var(--field-panel-line);padding:10px;box-shadow:var(--shadow)}
.field-header{display:grid;grid-template-columns:70px auto 1fr;column-gap:var(--group-gap);align-items:center;margin-bottom:8px}
.tool-pair{display:grid;grid-template-columns:var(--seg-w) var(--seg-w);gap:0;justify-content:start}
.tool-pair .tool-btn + .tool-btn{border-left:none}
.quarter-tabs{display:grid;grid-template-columns:repeat(4,var(--seg-w));gap:0;justify-content:start}
.quarter-tab + .quarter-tab{border-left:none}
.quarter-tab.active{background:linear-gradient(180deg, rgba(255,255,255,.07), rgba(255,255,255,0) 36%),linear-gradient(180deg,#0f151c,#171d24);border-color:#5b6672;color:#fff}

.field{position:relative;overflow:hidden;background:
  linear-gradient(90deg,
    rgba(255,255,255,.040) 0%, rgba(255,255,255,.012) 10%,
    rgba(255,255,255,.040) 20%, rgba(255,255,255,.012) 30%,
    rgba(255,255,255,.040) 40%, rgba(255,255,255,.012) 50%,
    rgba(255,255,255,.040) 60%, rgba(255,255,255,.012) 70%,
    rgba(255,255,255,.040) 80%, rgba(255,255,255,.012) 90%,
    rgba(255,255,255,.040) 100%),
  radial-gradient(circle at 50% 40%, rgba(255,255,255,.022), transparent 48%),
  linear-gradient(180deg,var(--field),var(--field2));
  border:1px solid rgba(255,255,255,.05);box-shadow:inset 0 0 18px rgba(0,0,0,.18);height:48svh;max-height:390px;min-height:250px}
.field::before{content:"";position:absolute;left:0;top:50%;transform:translateY(-50%);width:100%;height:1px;background:var(--field-line)}
.center-circle{position:absolute;width:94px;height:94px;border:1px solid var(--field-line);border-radius:50%;left:50%;top:50%;transform:translate(-50%,-50%)}
.center-dot{position:absolute;width:8px;height:8px;border-radius:50%;background:rgba(255,255,255,.18);left:50%;top:50%;transform:translate(-50%,-50%)}
.penalty-top,.penalty-bottom{position:absolute;left:50%;transform:translateX(-50%);width:138px;height:58px;border:1px solid var(--field-line);opacity:.72}
.penalty-top{top:0;border-top:none}.penalty-bottom{bottom:0;border-bottom:none}
.arc-top,.arc-bottom{position:absolute;left:50%;transform:translateX(-50%);width:86px;height:42px;border:1px solid var(--field-line);border-left:none;border-right:none;border-top:none;border-radius:0 0 86px 86px;opacity:.42}
.arc-top{top:57px;transform:translateX(-50%) rotate(180deg)} .arc-bottom{bottom:57px}

.field-grid{position:absolute;inset:10px;display:grid;grid-template-columns:repeat(5,1fr);grid-template-rows:repeat(5,1fr);gap:6px}
.slot{border:1px dashed var(--slot-line);background:rgba(255,255,255,.028);display:flex;align-items:center;justify-content:center;flex-direction:column;font-size:15px;font-weight:700;color:#f8fafc;text-align:center;padding:2px;cursor:pointer;user-select:none;box-shadow:inset 0 1px 0 rgba(255,255,255,.03)}
.slot.filled{background:rgba(255,255,255,.05)}
.slot.dup{background:#fee2e2;border-color:#fca5a5;color:#7f1d1d}
.gk-label{color:var(--gold);font-size:9px;font-weight:700;margin-top:2px;line-height:1}

.rest-grid{display:flex;flex-wrap:wrap;gap:6px}
.rest-cell{width:var(--label-w);height:34px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;background:linear-gradient(180deg, rgba(255,255,255,.055), rgba(255,255,255,0) 34%),linear-gradient(180deg,var(--box),var(--box2));border:1px solid var(--box-line);color:var(--text);box-shadow:0 2px 4px rgba(0,0,0,.35), var(--inset)}
.credit{text-align:center;color:var(--muted);font-size:10px;margin-top:auto;padding-top:2px;letter-spacing:.15px}

@media (max-width:380px){
  .box,.quarter-tab,.tool-btn{font-size:11px}
  .attendee{font-size:11px}
  .slot{font-size:14px}
  .rest-cell{font-size:11px}
  .field-header{grid-template-columns:64px auto 1fr}
  .quarter-tabs{grid-template-columns:repeat(4,40px)}
  .tool-pair{grid-template-columns:40px 40px}
  .top-row{grid-template-columns:calc(52px + 38px) minmax(0,1fr) 42px 34px}
}
</style>
</head>
<body>
<div class="app"><div class="frame">
<div class="panel">
  <div class="brand"><span class="brand-badge">Football Quarter Manager</span></div>
  <div class="top-row">
    <div class="top-pair">
      <div class="box">참석자</div>
      <div id="countBox" class="box">0</div>
    </div>
    <input id="nameInput" class="name-input" placeholder="이름 입력" maxlength="12" />
    <div id="addBtn" class="box clickable">추가</div>
    <div id="deleteModeBtn" class="box delete tool-dark clickable">삭제</div>
  </div>
  <div id="attendeeGrid" class="attendees-grid"></div>
</div>

<div class="field-panel">
  <div class="field-header">
    <div class="box">포메이션</div>
    <div class="tool-pair">
      <div id="clearQuarterBtn" class="tool-btn tool-dark">리셋</div>
      <div id="copyNextBtn" class="tool-btn tool-dark">복사</div>
    </div>
    <div id="quarterTabs" class="quarter-tabs"></div>
  </div>
  <div class="field">
    <div class="penalty-top"></div><div class="penalty-bottom"></div>
    <div class="arc-top"></div><div class="arc-bottom"></div>
    <div class="center-circle"></div><div class="center-dot"></div>
    <div id="fieldGrid" class="field-grid"></div>
  </div>
</div>

<div class="panel"><div id="restGrid" class="rest-grid"></div></div>
<div class="credit">Hayden Lee</div>
</div></div>

<script>
(() => {
const STORAGE_KEY="quarter-manager-layout-v17";
const MAX_PLAYERS=20;
const QUARTERS=["1Q","2Q","3Q","4Q"];
const SLOT_KEYS=Array.from({length:25},(_,i)=>`S${i+1}`);
const GK_SLOT="S23";
const $=id=>document.getElementById(id);

function createEmptyQuarter(){const q={};SLOT_KEYS.forEach(k=>q[k]="");return q}
function initialState(){const quarters={};QUARTERS.forEach(q=>quarters[q]=createEmptyQuarter());return{players:[],activeQuarter:"1Q",selectedPlayer:"",deleteMode:false,quarters}}
function load(){try{const raw=localStorage.getItem(STORAGE_KEY);if(!raw)return initialState();const parsed=JSON.parse(raw);const quarters={};QUARTERS.forEach(q=>quarters[q]={...createEmptyQuarter(),...((parsed.quarters&&parsed.quarters[q])||{})});return{players:Array.isArray(parsed.players)?parsed.players.slice(0,MAX_PLAYERS):[],activeQuarter:QUARTERS.includes(parsed.activeQuarter)?parsed.activeQuarter:"1Q",selectedPlayer:parsed.selectedPlayer||"",deleteMode:!!parsed.deleteMode,quarters}}catch{return initialState()}}
let state=load();
function save(){localStorage.setItem(STORAGE_KEY,JSON.stringify(state))}
function normalize(v){return String(v||"").trim()}
function fieldQuarterCount(player){return QUARTERS.reduce((sum,q)=>sum+Object.entries(state.quarters[q]).filter(([key,val])=>key!==GK_SLOT&&normalize(val)===player).length,0)}
function gkQuarterCount(player){return QUARTERS.reduce((sum,q)=>sum+(normalize(state.quarters[q][GK_SLOT])===player?1:0),0)}
function duplicateNames(q){const counts={};Object.values(state.quarters[q]).forEach(v=>{const n=normalize(v);if(!n)return;counts[n]=(counts[n]||0)+1});return new Set(Object.keys(counts).filter(name=>counts[name]>1))}
function assignedNamesForQuarter(q){return new Set(Object.values(state.quarters[q]).map(normalize).filter(Boolean))}
function resters(q){const assigned=assignedNamesForQuarter(q);return state.players.filter(name=>!assigned.has(name))}
function addPlayer(){const input=$("nameInput"),name=normalize(input.value);if(!name)return;if(state.players.includes(name)){input.value="";return}if(state.players.length>=MAX_PLAYERS){alert("최대 20명까지 추가할 수 있습니다.");return}state.players.push(name);input.value="";render()}
function removePlayer(name){state.players=state.players.filter(p=>p!==name);QUARTERS.forEach(q=>{Object.keys(state.quarters[q]).forEach(k=>{if(normalize(state.quarters[q][k])===name)state.quarters[q][k]=""})});if(state.selectedPlayer===name)state.selectedPlayer="";render()}
function selectPlayer(name){if(state.deleteMode){removePlayer(name);return}state.selectedPlayer=state.selectedPlayer===name?"":name;render()}
function setQuarter(q){state.activeQuarter=q;state.selectedPlayer="";render()}
function clearCurrentQuarter(){if(!confirm(`${state.activeQuarter}를 초기화할까요?`))return;state.quarters[state.activeQuarter]=createEmptyQuarter();state.selectedPlayer="";render()}
function copyToNextQuarter(){const idx=QUARTERS.indexOf(state.activeQuarter);if(idx>=QUARTERS.length-1)return;const nextQ=QUARTERS[idx+1];state.quarters[nextQ]={...state.quarters[state.activeQuarter]};state.activeQuarter=nextQ;state.selectedPlayer="";render()}
function toggleDeleteMode(){state.deleteMode=!state.deleteMode;if(state.deleteMode)state.selectedPlayer="";render()}
function handleSlotClick(slotKey){const current=state.quarters[state.activeQuarter][slotKey];if(state.selectedPlayer){state.quarters[state.activeQuarter][slotKey]=state.selectedPlayer;state.selectedPlayer=""}else if(current){state.quarters[state.activeQuarter][slotKey]=""}render()}
function renderQuarterTabs(){const wrap=$("quarterTabs");wrap.innerHTML="";QUARTERS.forEach(q=>{const btn=document.createElement("div");btn.className="quarter-tab box clickable"+(state.activeQuarter===q?" active":"");btn.textContent=q;btn.addEventListener("click",()=>setQuarter(q));wrap.appendChild(btn)})}
function renderAttendees(){const grid=$("attendeeGrid");grid.innerHTML="";const list=state.players.slice();while(list.length<MAX_PLAYERS)list.push("");list.forEach(name=>{const btn=document.createElement("button");btn.className="attendee"+(name&&state.selectedPlayer===name?" selected":"")+(name&&state.deleteMode?" delete-target":"")+(!name?" empty":"");if(name){const field=fieldQuarterCount(name),gk=gkQuarterCount(name);btn.innerHTML=gk>0?`${name} <span class="main-num">(${field}</span><span class="slash">/</span><span class="gk-num">${gk}</span><span class="main-num">)</span>`:`${name} <span class="main-num">(${field})</span>`;btn.addEventListener("click",()=>selectPlayer(name))}grid.appendChild(btn)});$("countBox").textContent=String(state.players.length);$("deleteModeBtn").classList.toggle("active",state.deleteMode)}
function renderField(){const grid=$("fieldGrid"),q=state.activeQuarter,dups=duplicateNames(q);grid.innerHTML="";SLOT_KEYS.forEach(slotKey=>{const name=state.quarters[q][slotKey];const div=document.createElement("div");div.className="slot"+(name?" filled":"")+(name&&dups.has(normalize(name))?" dup":"");if(name){if(slotKey===GK_SLOT){div.innerHTML=`<div>${name}</div><div class="gk-label">GK</div>`}else{div.textContent=name}}else if(slotKey===GK_SLOT){div.innerHTML=`<div class="gk-label">GK</div>`}div.addEventListener("click",()=>handleSlotClick(slotKey));grid.appendChild(div)})}
function renderRest(){const grid=$("restGrid");grid.innerHTML="";const label=document.createElement("div");label.className="rest-cell";label.textContent="휴식";grid.appendChild(label);resters(state.activeQuarter).forEach(name=>{const div=document.createElement("div");div.className="rest-cell";div.textContent=name;grid.appendChild(div)})}
function render(){save();renderQuarterTabs();renderAttendees();renderField();renderRest()}
$("addBtn").addEventListener("click",addPlayer);
$("nameInput").addEventListener("keydown",e=>{if(e.key==="Enter")addPlayer()});
$("deleteModeBtn").addEventListener("click",toggleDeleteMode);
$("clearQuarterBtn").addEventListener("click",clearCurrentQuarter);
$("copyNextBtn").addEventListener("click",copyToNextQuarter);
render();
})();
</script>
</body>
</html>
